<body>
<div id="root"></div>
<script type="text/babel">

const EVALUATION_CRITERIA = [

  { id:"scalability", label:"Scalability & Elasticity", weight:15, description:"Petabyte-scale, auto-scaling, multi-tenant isolation", subcriteria:["Max capacity (PB)","Auto-scale","Burst handling","Multi-tenant","Global namespace"] },
  { id:"compatibility", label:"DGX Cloud Compatibility", weight:20, description:"CUDA, NCCL, InfiniBand, certified integrations", subcriteria:["CUDA integration","NCCL support","InfiniBand/RoCE","NVIDIA cert","API compat"] },
  { id:"reliability", label:"Reliability & SLA", weight:15, description:"Availability SLA, DR, RPO/RTO, data durability", subcriteria:["Uptime SLA (%)","Durability","RTO (min)","RPO (min)","Geo-redundancy"] },
  { id:"security", label:"Security & Compliance", weight:10, description:"Encryption, zero-trust, SOC2, FedRAMP, HIPAA", subcriteria:["Encrypt at rest","Encrypt transit","SOC2 Type II","FedRAMP","RBAC/IAM"] },
  { id:"economics", label:"Cost Economics", weight:10, description:"TCO, pricing model, egress costs, commit discounts", subcriteria:["$/TB/month","Egress cost","Commit discount","Overage","TCO vs on-prem"] },
  { id:"support", label:"Support & Maturity", weight:5, description:"Vendor stability, support tier, ecosystem maturity", subcriteria:["Funding stage","Dedicated TAM","SLA response","Customer refs","NVIDIA tier"] },
  { id:"innovation", label:"Roadmap & Innovation", weight:5, description:"AI-native features, GenAI datasets, vector store readiness", subcriteria:["GenAI dataset ops","Vector store","Checkpoint opt","AI pipeline","12-mo roadmap"] },
];

const SAMPLE_PARTNERS = [
  { id:"weka", name:"WekaFS", category:"High-Performance Parallel FS", logo:"W", color:"#00D4FF",
    scores:{performance:9.2,scalability:8.5,compatibility:9.0,reliability:8.8,security:8.0,economics:6.5,support:8.5,innovation:9.0},
    highlights:["GPU-Direct certified","NVMe-oF native","NVIDIA DGX reference arch"], risks:["Premium pricing","Newer enterprise track record"],
    notes:"Leading AI-native file system. Strong NVIDIA partnership." },
  { id:"vast", name:"VAST Data", category:"AI-Native Storage", logo:"V", color:"#7C3AED",

  { id:"netapp", name:"NetApp StorageGRID", category:"Enterprise Hybrid Storage", logo:"N", color:"#38BDF8",
    scores:{performance:7.5,scalability:8.8,compatibility:7.8,reliability:9.5,security:9.2,economics:7.5,support:9.5,innovation:7.0},
    highlights:["30+ yr enterprise track record","FedRAMP authorized","Global support"], risks:["Legacy architecture","Slower AI feature velocity"],
    notes:"Safest enterprise pick. Strong for regulated industries." },
  { id:"ddn", name:"DDN EXAScaler", category:"HPC/AI Storage", logo:"D", color:"#FF6B35",
    scores:{performance:9.5,scalability:9.0,compatibility:9.2,reliability:8.5,security:8.0,economics:6.0,support:8.8,innovation:8.5},
    highlights:["HPC heritage","Lustre-based","Top500 deployments"], risks:["High cost","Complex operations"],
    notes:"Best raw performance. Traditional HPC leader moving to AI." },
  { id:"hammerspace", name:"Hammerspace", category:"Global Data Fabric", logo:"H", color:"#10B981",
    scores:{performance:7.8,scalability:9.0,compatibility:7.5,reliability:8.2,security:7.8,economics:8.0,support:7.0,innovation:8.8},
    highlights:["Hybrid-cloud native","Data orchestration","Multi-cloud fabric"], risks:["Smaller ecosystem","Newer market presence"],
    notes:"Innovative global namespace. Good for multi-cloud NCP scenarios." },
  { id:"ibm", name:"IBM Spectrum Scale", category:"Enterprise Parallel FS", logo:"I", color:"#60A5FA",
    scores:{performance:8.2,scalability:9.5,compatibility:7.5,reliability:9.8,security:9.5,economics:6.0,support:9.8,innovation:6.5},
    highlights:["Proven petabyte scale","FedRAMP/HIPAA","Fortune 500 refs"], risks:["High TCO","Slower innovation cycle"],
    notes:"Most mature and reliable. Best for large regulated enterprises." },

const USE_CASE_WEIGHTS = {
  training:      {performance:25,scalability:20,compatibility:25,reliability:10,security:5,economics:5,support:5,innovation:5},
  inference:     {performance:20,scalability:15,compatibility:20,reliability:20,security:10,economics:10,support:3,innovation:2},
  checkpointing: {performance:30,scalability:10,compatibility:20,reliability:20,security:5,economics:10,support:3,innovation:2},
  all:           {performance:20,scalability:15,compatibility:20,reliability:15,security:10,economics:10,support:5,innovation:5},
};

const CRITERION_COLORS = ["#00D4FF","#7C3AED","#10B981","#F59E0B","#EF4444","#EC4899","#06B6D4","#84CC16"];

function computeWeightedScore(partner, weights) {
  const total = Object.values(weights).reduce((a,b)=>a+b,0);
  return EVALUATION_CRITERIA.reduce((sum,c) => sum + (partner.scores[c.id]||0) * ((weights[c.id]??c.weight)/total), 0);
}

function getGrade(score) {
  if (score>=8.5) return {label:"A+",color:"#10B981"};
  if (score>=8.0) return {label:"A", color:"#34D399"};
  if (score>=7.5) return {label:"B+",color:"#FBBF24"};
  if (score>=7.0) return {label:"B", color:"#F59E0B"};
  if (score>=6.0) return {label:"C", color:"#EF4444"};
  return {label:"D",color:"#991B1B"};
}

function RadarChart({scores, color, size=140}) {
  const cx=size/2, cy=size/2, r=size*0.36, n=EVALUATION_CRITERIA.length;
  const pts = EVALUATION_CRITERIA.map((c,i) => {
    const a = (i/n)*2*Math.PI - Math.PI/2, v=(scores[c.id]||0)/10;
    return {x: cx+r*v*Math.cos(a), y: cy+r*v*Math.sin(a)};
  });
  const poly = pts.map(p=>`${p.x},${p.y}`).join(" ");
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {[0.25,0.5,0.75,1].map(lv => {
        const gp = EVALUATION_CRITERIA.map((_,i)=>{
          const a=(i/n)*2*Math.PI-Math.PI/2;
          return `${cx+r*lv*Math.cos(a)},${cy+r*lv*Math.sin(a)}`;
        }).join(" ");
        return <polygon key={lv} points={gp} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="0.5"/>;
      })}
      {EVALUATION_CRITERIA.map((_,i)=>{
        const a=(i/n)*2*Math.PI-Math.PI/2;
        return <line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke="rgba(255,255,255,0.07)" strokeWidth="0.5"/>;
      })}
      <polygon points={poly} fill={color+"2a"} stroke={color} strokeWidth="1.5"/>
    </svg>
  );
}

function ScoreBar({value, color}) {
  return (
    <div style={{background:"rgba(255,255,255,0.06)",borderRadius:4,height:5,overflow:"hidden",flex:1}}>
      <div style={{width:`${(value/10)*100}%`,height:"100%",background:color,borderRadius:4,transition:"width 0.6s cubic-bezier(.4,0,.2,1)"}}/>
    </div>
  );
}

function Tag({children, color}) {
  return <span style={{display:"inline-flex",alignItems:"center",padding:"2px 7px",borderRadius:4,fontSize:9,fontWeight:700,letterSpacing:"0.08em",background:color+"22",color,border:`1px solid ${color}44`}}>{children}</span>;
}

function Card({children, highlight, style={}}) {
  return (
    <div style={{
      background: highlight ? "rgba(0,212,255,0.06)" : "rgba(255,255,255,0.05)",
      border: `1px solid ${highlight ? "rgba(0,212,255,0.25)" : "rgba(255,255,255,0.1)"}`,
      borderRadius:14, padding:20,
      backdropFilter:"blur(4px)",
      ...style
    }}>
      {children}
    </div>
  );
}

function SectionTitle({children}) {
  return <div style={{fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",color:"#94A3B8",marginBottom:14,fontWeight:700}}>{children}</div>;
}

function Btn({children, onClick, variant="primary", size="md", disabled=false, style={}}) {
  const base = {padding: size==="sm"?"5px 12px":"9px 18px", borderRadius:7, border:"none", cursor:disabled?"not-allowed":"pointer",
    fontFamily:"'IBM Plex Mono',monospace", fontSize:size==="sm"?10:11, fontWeight:700, letterSpacing:"0.1em",
    textTransform:"uppercase", transition:"all 0.2s", opacity:disabled?0.55:1};
  const variants = {
    primary:{background:"linear-gradient(135deg,#00D4FF,#7C3AED)",color:"#fff"},
    secondary:{background:"rgba(255,255,255,0.07)",color:"#94A3B8",border:"1px solid rgba(255,255,255,0.1)"},
    ghost:{background:"transparent",color:"#64748B"},
  };
  return <button onClick={disabled?undefined:onClick} style={{...base,...variants[variant],...style}}>{children}</button>;
}

const AUTOMATION_STEPS = [
  {icon:"📋",label:"Ingest Proposals",desc:"Parse vendor RFP responses via API / PDF extraction"},
  {icon:"🔍",label:"Auto-Score Criteria",desc:"AI extracts technical specs → maps to scoring rubric"},
  {icon:"⚖️",label:"Apply Use-Case Weights",desc:"Weight matrix applied per workload profile"},
  {icon:"🧮",label:"Compute Weighted Scores",desc:"Normalized 0–10 scores across all dimensions"},
  {icon:"📊",label:"Generate Comparison Matrix",desc:"Side-by-side shortlist with risk flags"},
  {icon:"🏆",label:"Recommend Top 3",desc:"Ranked shortlist with rationale for NCP review"},
  {icon:"📄",label:"Export Decision Report",desc:"Board-ready PDF with complete audit trail"},
];

function Dashboard({partners, weights, useCase, setUseCase}) {
  const [filter, setFilter] = useState("all");
  const [selected, setSelected] = useState(["weka","vast","ddn"]);

  const categories = ["all",...new Set(partners.map(p=>p.category))];

    .map(p=>({...p, ws:computeWeightedScore(p,weights)}))
    .sort((a,b)=>b.ws-a.ws);

  const toggle = (id) => setSelected(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);

  return (
    <div className="page-enter" style={{display:"flex",flexDirection:"column",gap:22}}>
      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>

            <div style={{width:44,height:44,borderRadius:12,background:kpi.color+"18",border:`1px solid ${kpi.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{kpi.icon}</div>
            <div>

          {[["training","LLM Training","#00D4FF"],["inference","Inference Serving","#10B981"],["checkpointing","Checkpoint Storage","#FBBF24"],["all","Balanced / All","#7C3AED"]].map(([id,label,color])=>(
            <button key={id} onClick={()=>setUseCase(id)} style={{padding:"7px 16px",borderRadius:7,border:`1px solid ${useCase===id?color:"rgba(255,255,255,0.1)"}`,background:useCase===id?color+"22":"rgba(255,255,255,0.04)",color:useCase===id?color:"#64748B",fontSize:10,fontWeight:700,letterSpacing:"0.1em",cursor:"pointer",textTransform:"uppercase",fontFamily:"inherit",transition:"all 0.2s"}}>
              {label}

          ))}
        </div>
      </Card>

      {/* Filter row */}
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:10,color:"#475569",letterSpacing:"0.1em"}}>FILTER:</span>
        {categories.map(cat=>(
          <button key={cat} onClick={()=>setFilter(cat)} style={{padding:"4px 12px",borderRadius:5,border:`1px solid ${filter===cat?"rgba(0,212,255,0.3)":"rgba(255,255,255,0.08)"}`,background:filter===cat?"rgba(0,212,255,0.1)":"rgba(255,255,255,0.03)",color:filter===cat?"#00D4FF":"#64748B",fontSize:10,cursor:"pointer",fontFamily:"inherit",fontWeight:600,letterSpacing:"0.06em",transition:"all 0.2s"}}>
            {cat==="all"?"All Categories":cat}
          </button>
        ))}
      </div>

      {/* Partner list */}
      <div>
        <SectionTitle>Ranked Partners · {useCase.toUpperCase()} Profile</SectionTitle>

          {ranked.map((p,idx)=>{
            const grade=getGrade(p.ws), isSel=selected.includes(p.id);

        <SectionTitle>🏆 Recommended Shortlist for NCP Review</SectionTitle>

      </div>

  );
}

function WeightEngine({weights, setWeights, useCase, setUseCase}) {
  const total = Object.values(weights).reduce((a,b)=>a+b,0);
  return (
    <div className="page-enter" style={{display:"flex",flexDirection:"column",gap:20}}>

CRITERIA_WEIGHTS = {
    "performance":    {"training": 25, "inference": 20, "checkpointing": 30, "all": 20},
    "scalability":    {"training": 20, "inference": 15, "checkpointing": 10, "all": 15},

}

def compute_weighted_score(partner_scores: dict, use_case: str = "all") -> float:
    weights = {k: v[use_case] for k, v in CRITERIA_WEIGHTS.items()}
    total_w = sum(weights.values())
    return round(sum(partner_scores.get(k,0) * w for k,w in weights.items()) / total_w, 2)

def shortlist(partners: list, use_case: str = "all", top_n: int = 3) -> list:
    return sorted(partners, key=lambda p: compute_weighted_score(p["scores"], use_case), reverse=True)[:top_n]

# Auto-score from vendor RFP using Claude API
def auto_score_from_rfp(rfp_text: str, client) -> dict:

        messages=[{"role":"user","content":f"Score this storage RFP 0-10 per criterion, return JSON only:\\n{rfp_text}"}]
    )
    import json; return json.loads(msg.content[0].text)`}</pre>

function generateResults(profile, partner) {
  const seed = partner.scores.performance * 10 + partner.scores.compatibility * 5;
  const base = seed / 150;
  const jitter = () => (Math.random() - 0.5) * 0.15;

  const throughputs = Array.from({length:10}, (_,i) => {
    const ramp = Math.min(1, (i+1)/4);
    return Math.round((base * ramp + jitter()) * profile.params.nodes * 8.5 * 10) / 10;
  });
  const latencies = Array.from({length:10}, (_,i) => {
    const load = i/9;
    return Math.round((80 + load * 120 + jitter()*30) / (partner.scores.performance/10));
  });
  const iops = throughputs.map(t => Math.round(t * 1000 / profile.params.fileSize));

  return {
    throughputs,
    latencies,
    iops,
    p50: Math.round(latencies[4] * 0.8),
    p95: Math.round(latencies[7] * 1.3),
    p99: Math.round(latencies[9] * 1.8),
    maxThroughput: Math.max(...throughputs),
    avgIOPS: Math.round(iops.reduce((a,b)=>a+b,0)/iops.length),
    passRate: partner.scores.performance >= 8.5 ? 100 : partner.scores.performance >= 7.5 ? 87 : 72,
  };
}

function MiniChart({data, color, label, unit, height=60}) {
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const w = 220, h = height;
  const pts = data.map((v,i) => `${(i/(data.length-1))*w},${h - ((v-min)/range)*(h-8) - 4}`).join(" ");
  return (
    <div>
      <div style={{fontSize:9,color:"#64748B",letterSpacing:"0.1em",marginBottom:4,textTransform:"uppercase"}}>{label}</div>
      <svg width={w} height={h} style={{overflow:"visible"}}>
        <defs>
          <linearGradient id={`g${label.replace(/\s/g,"")}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        <polygon points={`0,${h} ${pts} ${w},${h}`} fill={`url(#g${label.replace(/\s/g,"")})`}/>
        <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/>
        {data.map((v,i)=>(
          <circle key={i} cx={(i/(data.length-1))*w} cy={h-((v-min)/range)*(h-8)-4} r="2.5" fill={color} opacity="0.7"/>
        ))}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#475569",marginTop:2}}>
        <span>{min.toFixed(1)}{unit}</span>
        <span style={{color,fontWeight:700}}>{max.toFixed(1)}{unit}</span>
      </div>
    </div>
  );
}

function PassFailBar({value, label}) {
  const color = value>=90?"#10B981":value>=75?"#FBBF24":"#EF4444";
  return (
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:10,color:"#94A3B8"}}>{label}</span>
        <span style={{fontSize:11,fontWeight:700,color}}>{value}%</span>
      </div>
      <div style={{background:"rgba(255,255,255,0.06)",borderRadius:4,height:6,overflow:"hidden"}}>
        <div style={{width:`${value}%`,height:"100%",background:color,borderRadius:4,transition:"width 0.8s cubic-bezier(.4,0,.2,1)"}}/>
      </div>
    </div>
  );
}

function LoadTesting({partners}) {
  const [profile, setProfile] = useState(LOAD_TEST_PROFILES[0]);
  const [params, setParams] = useState({...LOAD_TEST_PROFILES[0].params});
  const [running, setRunning] = useState(false);
  const [progress, setProgress] = useState(0);
  const [results, setResults] = useState(null);
  const [phase, setPhase] = useState("");

  const PHASES = ["Initializing test harness...","Provisioning storage mounts...","Warming up GPU nodes...","Running sequential throughput pass...","Running random IOPS pass...","Measuring latency percentiles...","Running burst stress test...","Collecting GPU-Direct metrics...","Analyzing results...","Generating report..."];

  const selectProfile = (p) => { setProfile(p); setParams({...p.params}); setResults(null); setProgress(0); };

  const runTest = () => {
    setRunning(true); setProgress(0); setResults(null);
    let p=0, phaseIdx=0;
    const iv = setInterval(()=>{
      p += Math.random()*12 + 3;
      phaseIdx = Math.min(PHASES.length-1, Math.floor((p/100)*PHASES.length));
      setProgress(Math.min(p,99));
      setPhase(PHASES[phaseIdx]);
      if(p>=100){
        clearInterval(iv);
        setProgress(100);
        setPhase("✅ Test complete");
        setRunning(false);
        // Generate results for top 3 partners
        const top3 = [...partners].sort((a,b)=>b.scores.performance-a.scores.performance).slice(0,3);
        setResults(top3.map(partner=>({partner, data:generateResults(profile,partner)})));
      }
    }, 280);
  };

  return (
    <div className="page-enter" style={{display:"flex",flexDirection:"column",gap:22}}>
      <div>
        <h1 style={{fontSize:20,fontWeight:900,color:"#F1F5F9",fontFamily:"'Syne',sans-serif"}}>🔥 Load Testing & Validation</h1>
        <p style={{fontSize:11,color:"#64748B",marginTop:4}}>Simulate real DGX Cloud workloads against shortlisted storage partners — validate before you commit</p>
      </div>

      {/* Test Profile Selector */}
      <Card>
        <SectionTitle>Select Workload Profile</SectionTitle>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
          {LOAD_TEST_PROFILES.map(p=>(
            <div key={p.id} onClick={()=>selectProfile(p)} style={{padding:"14px",borderRadius:9,border:`1px solid ${profile.id===p.id?"rgba(0,212,255,0.4)":"rgba(255,255,255,0.07)"}`,background:profile.id===p.id?"rgba(0,212,255,0.07)":"rgba(255,255,255,0.02)",cursor:"pointer",transition:"all 0.2s"}}>
              <div style={{fontSize:22,marginBottom:6}}>{p.icon}</div>
              <div style={{fontSize:11,fontWeight:700,color:profile.id===p.id?"#00D4FF":"#E2E8F0"}}>{p.label}</div>
              <div style={{fontSize:9,color:"#64748B",marginTop:4,lineHeight:1.5}}>{p.desc}</div>
            </div>
          ))}
        </div>
      </Card>

      {/* Parameters */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <Card>
          <SectionTitle>⚙️ Test Parameters</SectionTitle>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {[
              {key:"nodes",label:"GPU Nodes",min:1,max:256,unit:"nodes"},
              {key:"gpusPerNode",label:"GPUs per Node",min:1,max:8,unit:"GPUs"},
              {key:"fileSize",label:"File Size",min:1,max:1024,unit:"GB"},
              {key:"concurrency",label:"Concurrency",min:1,max:4096,unit:"threads"},
              {key:"duration",label:"Test Duration",min:30,max:600,unit:"sec"},
            ].map(({key,label,min,max,unit})=>(
              <div key={key}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:10,color:"#94A3B8"}}>{label}</span>
                  <span style={{fontSize:11,fontWeight:700,color:"#00D4FF",fontFamily:"'Syne',sans-serif"}}>{params[key]} {unit}</span>
                </div>
                <input type="range" min={min} max={max} value={params[key]} onChange={e=>setParams(p=>({...p,[key]:+e.target.value}))} style={{width:"100%",accentColor:"#00D4FF"}}/>
              </div>
            ))}
            <div>
              <div style={{fontSize:10,color:"#94A3B8",marginBottom:6}}>I/O Pattern</div>
              <div style={{display:"flex",gap:6}}>
                {["sequential","random","burst","mixed"].map(pat=>(
                  <button key={pat} onClick={()=>setParams(p=>({...p,pattern:pat}))} style={{padding:"4px 10px",borderRadius:5,border:`1px solid ${params.pattern===pat?"rgba(0,212,255,0.4)":"rgba(255,255,255,0.1)"}`,background:params.pattern===pat?"rgba(0,212,255,0.12)":"transparent",color:params.pattern===pat?"#00D4FF":"#64748B",fontSize:9,cursor:"pointer",fontFamily:"inherit",fontWeight:700,textTransform:"uppercase"}}>
                    {pat}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:10,color:"#94A3B8",marginBottom:6}}>Protocol</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {["NVMe-oF","NFS/RDMA","NFS","S3","POSIX"].map(proto=>(
                  <button key={proto} onClick={()=>setParams(p=>({...p,protocol:proto}))} style={{padding:"4px 10px",borderRadius:5,border:`1px solid ${params.protocol===proto?"rgba(124,58,237,0.5)":"rgba(255,255,255,0.1)"}`,background:params.protocol===proto?"rgba(124,58,237,0.12)":"transparent",color:params.protocol===proto?"#7C3AED":"#64748B",fontSize:9,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
                    {proto}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </Card>

        <Card>
          <SectionTitle>🛠️ Benchmark Tools</SectionTitle>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
            {BENCHMARK_TOOLS.map(t=>(
              <div key={t.name} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:7,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)"}}>
                <Tag color={t.color}>{t.name}</Tag>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,fontWeight:600,color:"#E2E8F0"}}>{t.use}</div>
                  <div style={{fontSize:9,color:"#64748B"}}>{t.desc}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{background:"rgba(255,255,255,0.02)",borderRadius:8,padding:"12px",border:"1px solid rgba(255,255,255,0.06)"}}>
            <div style={{fontSize:9,color:"#64748B",letterSpacing:"0.1em",marginBottom:8,fontWeight:700}}>TEST SUMMARY</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {[
                ["Profile",profile.label],
                ["Nodes",`${params.nodes} × ${params.gpusPerNode} GPUs`],
                ["Pattern",params.pattern.toUpperCase()],
                ["Protocol",params.protocol],
                ["File Size",`${params.fileSize} GB`],
                ["Duration",`${params.duration}s`],
              ].map(([k,v])=>(
                <div key={k}>
                  <div style={{fontSize:8,color:"#475569",letterSpacing:"0.08em"}}>{k.toUpperCase()}</div>
                  <div style={{fontSize:10,fontWeight:700,color:"#00D4FF"}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        </Card>
      </div>

      {/* Run Button + Progress */}
      <Card highlight>
        <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
          <Btn onClick={runTest} disabled={running} style={{minWidth:200}}>
            {running?"⏳ Running Test...":"▶ Run Load Test"}
          </Btn>
          {(running||progress>0)&&(
            <div style={{flex:1,minWidth:200}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:10,color:"#64748B"}}>{phase}</span>
                <span style={{fontSize:11,fontWeight:700,color:"#00D4FF"}}>{Math.round(progress)}%</span>
              </div>
              <div style={{background:"rgba(255,255,255,0.06)",borderRadius:4,height:6,overflow:"hidden"}}>
                <div style={{width:`${progress}%`,height:"100%",background:"linear-gradient(90deg,#00D4FF,#7C3AED)",borderRadius:4,transition:"width 0.3s ease"}}/>
              </div>
            </div>
          )}
        </div>
      </Card>

      {/* Results */}
      {results&&(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div style={{fontSize:14,fontWeight:900,color:"#F1F5F9",fontFamily:"'Syne',sans-serif"}}>📊 Test Results — {profile.label} · {params.nodes} Nodes · {params.protocol}</div>

          {/* Winner banner */}
          <Card style={{background:"rgba(255,215,0,0.04)",borderColor:"rgba(255,215,0,0.2)"}}>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <div style={{fontSize:32}}>🏆</div>
              <div>
                <div style={{fontSize:9,color:"#FFD700",letterSpacing:"0.15em",fontWeight:700,marginBottom:4}}>TOP PERFORMER — {profile.label.toUpperCase()}</div>
                <div style={{fontSize:18,fontWeight:900,color:"#F1F5F9",fontFamily:"'Syne',sans-serif"}}>{results[0].partner.name}</div>
                <div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>
                  Peak {results[0].data.maxThroughput} GB/s · {results[0].data.avgIOPS.toLocaleString()} avg IOPS · p99 latency {results[0].data.p99}µs
                </div>
              </div>
              <div style={{marginLeft:"auto",textAlign:"center"}}>
                <div style={{fontSize:28,fontWeight:900,color:"#10B981",fontFamily:"'Syne',sans-serif"}}>{results[0].data.passRate}%</div>
                <div style={{fontSize:9,color:"#64748B",letterSpacing:"0.1em"}}>PASS RATE</div>
              </div>
            </div>
          </Card>

          {/* Per-partner results */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
            {results.map(({partner,data},ri)=>(
              <Card key={partner.id} style={{borderColor:partner.color+"44"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                  <div style={{width:30,height:30,borderRadius:7,background:partner.color+"22",border:`1px solid ${partner.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:partner.color,fontSize:13}}>{partner.logo}</div>
                  <div>
                    <div style={{fontWeight:700,fontSize:12,color:"#F1F5F9"}}>{partner.name}</div>
                    <div style={{fontSize:9,color:"#64748B"}}>{["🥇 Top Performer","🥈 Runner Up","🥉 Baseline"][ri]}</div>
                  </div>
                </div>

                {/* KPI row */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:14}}>
                  {[
                    {label:"Peak GB/s",value:data.maxThroughput},
                    {label:"Avg IOPS",value:(data.avgIOPS/1000).toFixed(1)+"K"},
                    {label:"p50 µs",value:data.p50},
                  ].map(m=>(
                    <div key={m.label} style={{background:"rgba(255,255,255,0.03)",borderRadius:6,padding:"8px",textAlign:"center"}}>
                      <div style={{fontSize:14,fontWeight:900,color:partner.color,fontFamily:"'Syne',sans-serif"}}>{m.value}</div>
                      <div style={{fontSize:8,color:"#475569",marginTop:2,letterSpacing:"0.08em"}}>{m.label}</div>
                    </div>
                  ))}
                </div>

                {/* Charts */}
                <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:14}}>
                  <MiniChart data={data.throughputs} color={partner.color} label="Throughput GB/s" unit=" GB/s" height={50}/>
                  <MiniChart data={data.latencies} color="#EF4444" label="Latency µs" unit="µs" height={50}/>
                </div>

                {/* Latency percentiles */}
                <div style={{background:"rgba(255,255,255,0.02)",borderRadius:7,padding:"10px",marginBottom:12}}>
                  <div style={{fontSize:9,color:"#64748B",letterSpacing:"0.1em",marginBottom:8,fontWeight:700}}>LATENCY PERCENTILES</div>
                  {[["p50",data.p50],["p95",data.p95],["p99",data.p99]].map(([p,v])=>(
                    <div key={p} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0"}}>
                      <span style={{fontSize:9,color:"#64748B",fontWeight:700}}>{p}</span>
                      <div style={{flex:1,margin:"0 10px",background:"rgba(255,255,255,0.05)",borderRadius:3,height:4,overflow:"hidden"}}>
                        <div style={{width:`${Math.min(100,(v/500)*100)}%`,height:"100%",background:v<100?"#10B981":v<200?"#FBBF24":"#EF4444"}}/>
                      </div>
                      <span style={{fontSize:10,fontWeight:700,color:v<100?"#10B981":v<200?"#FBBF24":"#EF4444"}}>{v}µs</span>
                    </div>
                  ))}
                </div>

                {/* Pass rates */}
                <PassFailBar value={data.passRate} label="Overall Pass Rate"/>
                <PassFailBar value={Math.round(data.passRate*0.95)} label="GPU-Direct Throughput SLA"/>
                <PassFailBar value={Math.round(data.passRate*1.02)} label="Latency SLA (p99 < 300µs)"/>
              </Card>
            ))}
          </div>

          {/* Acceptance criteria table */}
          <Card>
            <SectionTitle>✅ NCP Acceptance Criteria — Go / No-Go</SectionTitle>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead>
                <tr style={{background:"rgba(255,255,255,0.04)"}}>
                  {["Criterion","Threshold","WekaFS","VAST Data","DDN EXAScaler"].map(h=>(
                    <th key={h} style={{padding:"10px 14px",textAlign:"left",color:"#64748B",fontSize:9,letterSpacing:"0.1em",fontWeight:700,borderBottom:"1px solid rgba(255,255,255,0.08)"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {[
                  ["Sequential Throughput",`≥ ${Math.round(params.nodes*2)} GB/s`, true, true, true],
                  ["Random IOPS",`≥ ${Math.round(params.concurrency*500/1000)}K IOPS`, true, true, false],
                  ["p99 Latency","≤ 300µs", true, true, false],
                  ["GPU-Direct RDMA","Required", true, true, true],
                  ["NVMe-oF Support","Required", true, false, true],
                  ["Multi-tenant Isolation","Required", true, true, true],
                  ["Auto-failover < 30s","Required", false, true, true],
                ].map(([criterion, threshold, ...vals],ri)=>(
                  <tr key={criterion} style={{background:ri%2===0?"rgba(255,255,255,0.01)":"transparent"}}>
                    <td style={{padding:"9px 14px",fontSize:11,color:"#E2E8F0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>{criterion}</td>
                    <td style={{padding:"9px 14px",fontSize:10,color:"#64748B",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>{threshold}</td>
                    {vals.map((pass,vi)=>(
                      <td key={vi} style={{padding:"9px 14px",textAlign:"center",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                        <span style={{fontSize:14,color:pass?"#10B981":"#EF4444"}}>{pass?"✅":"❌"}</span>
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        </div>
      )}
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────

function App() {
  const [view, setView] = useState("dashboard");
  const [partners, setPartners] = useState(SAMPLE_PARTNERS);
  const [useCase, setUseCase] = useState("training");
  const [weights, setWeights] = useState({...USE_CASE_WEIGHTS.training});
  const [toast, setToast] = useState(null);

  useEffect(()=>{ setWeights({...USE_CASE_WEIGHTS[useCase]}); },[useCase]);

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(null),2800); };

  const addPartner = (p) => { setPartners(prev=>[...prev,p]); showToast(`✅ ${p.name} added to evaluation`); setView("dashboard"); };

  const NAVS = [["dashboard","📊 Dashboard"],["evaluate","⚖️ Weights"],["compare","🔬 Compare"],["workflow","🤖 Automation"],["loadtest","🔥 Load Test"],["add","➕ Add Partner"]];

  return (
    <div style={{fontFamily:"'IBM Plex Mono',monospace",background:"#0d1117",minHeight:"100vh",color:"#E2E8F0"}}>
      {/* TOAST */}
      {toast&&(
        <div className="toast-enter" style={{position:"fixed",top:76,right:22,background:"#0f1f0f",border:"1px solid #10B981",borderRadius:9,padding:"10px 18px",fontSize:11,color:"#34D399",zIndex:9999,fontWeight:700,letterSpacing:"0.05em",boxShadow:"0 8px 32px rgba(0,0,0,0.8), 0 0 20px rgba(16,185,129,0.2)"}}>
          {toast}
        </div>
      )}

      {/* HEADER */}
      <header style={{background:"rgba(13,17,23,0.95)",borderBottom:"1px solid rgba(255,255,255,0.1)",padding:"0 28px",display:"flex",alignItems:"center",justifyContent:"space-between",height:62,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(20px)",boxShadow:"0 4px 32px rgba(0,0,0,0.5)"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:36,height:36,background:"linear-gradient(135deg,#00D4FF,#7C3AED)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:"#fff",boxShadow:"0 0 24px rgba(0,212,255,0.45)"}}>N</div>
          <div>
            <div style={{fontSize:13,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"#F1F5F9",fontFamily:"'Syne',sans-serif"}}>NCP Storage Evaluator</div>
            <div style={{fontSize:9,color:"#64748B",letterSpacing:"0.16em",textTransform:"uppercase",marginTop:2}}>NVIDIA DGX Cloud · Partner Selection Automation</div>
          </div>
        </div>
        <nav style={{display:"flex",gap:2}}>
          {NAVS.map(([id,label])=>(
            <button key={id} onClick={()=>setView(id)} style={{padding:"7px 14px",borderRadius:7,border:"none",background:view===id?"rgba(0,212,255,0.14)":"transparent",color:view===id?"#67E8F9":"#94A3B8",cursor:"pointer",fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",fontFamily:"inherit",transition:"all 0.2s",borderBottom:view===id?"2px solid #00D4FF":"2px solid transparent"}}>
              {label}
            </button>
          ))}
        </nav>
      </header>
        </div>
        <nav style={{display:"flex",gap:2}}>
          {NAVS.map(([id,label])=>(
            <button key={id} onClick={()=>setView(id)} style={{padding:"7px 14px",borderRadius:7,border:"none",background:view===id?"rgba(0,212,255,0.14)":"transparent",color:view===id?"#67E8F9":"#94A3B8",cursor:"pointer",fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",fontFamily:"inherit",transition:"all 0.2s",borderBottom:view===id?"2px solid #00D4FF":"2px solid transparent"}}>
              {label}
            </button>
          ))}
        </nav>
      </header>

      {/* MAIN */}
      <main style={{padding:"26px 28px",maxWidth:1280,margin:"0 auto"}}>
        {view==="dashboard"&&<Dashboard partners={partners} weights={weights} useCase={useCase} setUseCase={setUseCase}/>}
        {view==="evaluate"&&<WeightEngine weights={weights} setWeights={setWeights} useCase={useCase} setUseCase={setUseCase}/>}
        {view==="compare"&&<Compare partners={partners} weights={weights}/>}
        {view==="workflow"&&<Workflow/>}
        {view==="loadtest"&&<LoadTesting partners={partners}/>}
        {view==="add"&&<AddPartner onAdd={addPartner}/>}
      </main>

      {/* FOOTER */}
      <footer style={{borderTop:"1px solid rgba(255,255,255,0.08)",padding:"14px 28px",display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:20,background:"rgba(0,0,0,0.2)"}}>
        <span style={{fontSize:9,color:"#475569",letterSpacing:"0.12em",textTransform:"uppercase"}}>NCP Storage Evaluator · NVIDIA DGX Cloud · Partner Selection Automation · v1.1</span>
        <span style={{fontSize:9,color:"#475569",letterSpacing:"0.08em"}}>{partners.length} vendors · {useCase.toUpperCase()} profile · Built for Keith @ NVIDIA</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
